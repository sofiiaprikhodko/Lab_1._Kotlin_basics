summary: "Лабораторна робота спрямована на практичне освоєння базового синтаксису\
  \ та фундаментальних концепцій мови програмування Kotlin. Під час виконання завд\
  ань студенти навчаться оголошувати змінні (val, var), працювати з основними типа\
  ми даних і рядковими шаблонами, а також застосовувати керуючі конструкції (if, when)\
  \ та цикли (for, while) для побудови простої алгоритмічної логіки. Головна мета\
  \ - отримати початкові навички написання, компіляції та перевірки працездатності\
  \ коду в середовищі розробки."
